<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auction OBS Overlay</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@600;700&family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:transparent;overflow:hidden;width:1920px;height:1080px;font-family:'Inter',sans-serif;}

/* ═══ PARTICLES ═══ */
.parts{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.part{position:absolute;border-radius:50%;animation:pf linear infinite;opacity:.07;}
@keyframes pf{from{transform:translateY(1100px);opacity:0}10%{opacity:.07}90%{opacity:.07}to{transform:translateY(-100px);opacity:0}}

/* ═══ IDLE ═══ */
#idle{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .8s;pointer-events:none;}
#idle.v{opacity:1;}
.idle-title{font-family:'Bebas Neue',cursive;font-size:130px;color:#fff;letter-spacing:10px;text-shadow:0 0 80px rgba(0,229,255,.5);text-align:center;animation:gl 3s ease-in-out infinite;}
.idle-sub{font-family:'Orbitron',monospace;font-size:22px;color:rgba(0,229,255,.6);letter-spacing:8px;margin-top:14px;text-align:center;}
@keyframes gl{0%,100%{text-shadow:0 0 60px rgba(0,229,255,.4)}50%{text-shadow:0 0 130px rgba(0,229,255,.9),0 0 300px rgba(0,229,255,.3)}}

/* ═══════════════════════════════════════
   INTRO CARD — full screen, shows 10sec
═══════════════════════════════════════ */
#introCard{
  position:absolute;
  left:50%; top:50%;
  transform:translate(-50%,-50%) scale(0.85);
  width:860px;
  background:linear-gradient(160deg,rgba(7,14,32,.97),rgba(3,7,18,.99));
  border:1px solid rgba(0,229,255,.25);
  border-radius:28px;
  padding:44px 50px;
  box-shadow:0 0 100px rgba(0,229,255,.1),0 40px 80px rgba(0,0,0,.6);
  opacity:0;
  pointer-events:none;
  transition:opacity .5s, transform .5s;
  overflow:hidden;
}
#introCard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#00e5ff,transparent);animation:sl 3s ease-in-out infinite;}
@keyframes sl{0%,100%{opacity:.3}50%{opacity:1}}
#introCard.v{opacity:1;transform:translate(-50%,-50%) scale(1);}

.ic-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.ic-num{font-family:'Orbitron',monospace;font-size:13px;color:rgba(0,229,255,.6);letter-spacing:3px;background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.15);padding:5px 16px;border-radius:20px;}
.ic-badges{display:flex;gap:8px;}
.rbadge{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:5px 16px;border-radius:20px;}
.rb-bat{background:rgba(0,255,136,.1);color:#00ff88;border:1px solid rgba(0,255,136,.2);}
.rb-bowl{background:rgba(255,51,102,.1);color:#ff3366;border:1px solid rgba(255,51,102,.2);}
.rb-all{background:rgba(255,215,0,.1);color:#ffd700;border:1px solid rgba(255,215,0,.2);}
.rb-wk{background:rgba(0,229,255,.1);color:#00e5ff;border:1px solid rgba(0,229,255,.2);}
.rb-home{background:rgba(0,180,216,.1);color:#00b4d8;border:1px solid rgba(0,180,216,.2);}
.rb-away{background:rgba(255,107,53,.1);color:#ff6b35;border:1px solid rgba(255,107,53,.2);}
.rb-re{background:rgba(255,107,53,.1);color:#ff6b35;border:1px solid rgba(255,107,53,.2);}

.ic-body{display:flex;gap:32px;align-items:flex-start;margin-bottom:28px;}
.ic-photo{width:160px;height:160px;border-radius:18px;object-fit:cover;border:1px solid rgba(255,255,255,.08);flex-shrink:0;background:rgba(255,255,255,.03);}
.ic-photo-ph{width:160px;height:160px;border-radius:18px;flex-shrink:0;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:64px;}
.ic-text{flex:1;}
.ic-name{font-family:'Bebas Neue',cursive;font-size:96px;color:#fff;line-height:.9;letter-spacing:3px;margin-bottom:6px;}
.ic-stats{font-size:16px;color:#555;font-weight:600;margin-bottom:18px;}
.ic-prices{display:grid;grid-template-columns:1fr 1.4fr;gap:14px;}
.pbox{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px 18px;}
.bidbox{background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.2);border-radius:12px;padding:14px 20px;text-align:right;}
.plbl{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.45);text-transform:uppercase;margin-bottom:4px;}
.bval{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#666;}
.bidval{font-family:'Orbitron',monospace;font-size:52px;font-weight:900;color:#ffd700;line-height:1;text-shadow:0 0 30px rgba(255,215,0,.4);transition:all .3s;}
.bidval.pop{animation:bp .4s ease-out;}
@keyframes bp{0%{transform:scale(1.3);color:#fff}100%{transform:scale(1);color:#ffd700}}
.bidr{font-size:14px;font-weight:700;color:#00e5ff;margin-top:4px;letter-spacing:1px;}

/* Countdown bar inside intro card */
.cdown-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:20px;overflow:hidden;}
.cdown-fill{height:100%;background:linear-gradient(90deg,var(--p,#00e5ff),#ffd700);border-radius:2px;width:100%;transition:width linear;}

/* ═══════════════════════════════════════
   IPL-STYLE BOTTOM BAR
═══════════════════════════════════════ */
#compactCard{
  position:absolute;
  bottom:0; left:0; right:0;
  height:130px;
  opacity:0;
  pointer-events:none;
  transition:opacity .5s;
}
#compactCard.v{opacity:1;}

/* Bottom gradient bg */
.cc-bg{
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,transparent,rgba(2,5,15,.97) 40%,rgba(2,5,15,1));
}

/* Player photo - rises above the bar */
#ccPhotoWrap{
  position:absolute;
  bottom:10px;
  left:220px;
  width:160px;
  height:200px;
  z-index:10;
}
#ccPhotoWrap img{
  width:100%;height:100%;
  object-fit:cover;
  object-position:top;
  filter:drop-shadow(0 0 20px rgba(0,229,255,.4));
}
#ccPhotoWrap .cc-photo-ph{
  width:160px;height:160px;
  display:flex;align-items:center;justify-content:center;
  font-size:60px;
}

/* Left section — team info */
.cc-left{
  position:absolute;
  left:40px; bottom:22px;
  display:flex;align-items:center;gap:16px;
  z-index:5;
}
.cc-team-logo{width:52px;height:52px;border-radius:10px;object-fit:cover;border:2px solid rgba(255,255,255,.15);}
.cc-team-logo-ph{width:52px;height:52px;border-radius:10px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid rgba(255,255,255,.1);}
.cc-team-info{}
.cc-player-name{font-family:'Bebas Neue',cursive;font-size:44px;color:#fff;letter-spacing:3px;line-height:1;text-shadow:0 2px 20px rgba(0,0,0,.8);}
.cc-team-name{font-size:16px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:1px;margin-top:2px;}

/* Right section — bid price */
.cc-right{
  position:absolute;
  right:40px; bottom:22px;
  text-align:right;
  z-index:5;
}
.cc-price-label{font-size:13px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.cc-bid{font-family:'Orbitron',monospace;font-size:52px;font-weight:900;color:#ffd700;line-height:1;text-shadow:0 0 30px rgba(255,215,0,.5);}
.cc-bid.pop{animation:bp .35s ease-out;}
.cc-bidder{font-size:16px;font-weight:700;color:#00e5ff;margin-top:4px;letter-spacing:1px;}
.cc-base{font-size:12px;color:rgba(255,255,255,.35);margin-top:2px;}

/* Badges row */
.cc-badges-row{
  position:absolute;
  left:40px; bottom:88px;
  display:flex;gap:6px;
  z-index:5;
}
.cbadge{font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:20px;text-transform:uppercase;}

/* Divider line */
.cc-divider{
  position:absolute;
  left:0;right:0;bottom:128px;
  height:2px;
  background:linear-gradient(90deg,transparent,rgba(0,229,255,.5),rgba(255,215,0,.5),transparent);
}

/* Timer bar at very bottom */
.cc-timer-strip{position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(255,255,255,.05);overflow:hidden;}
.cc-timer-fill{height:100%;background:linear-gradient(90deg,#00e5ff,#ffd700);transition:width .95s linear;}
.cc-timer-fill.urg{background:linear-gradient(90deg,#ff3366,#ff6b35);}

/* ═══ TEAMS PANEL (right side, compact) ═══ */
#teamPanel{
  position:absolute;
  right:40px;
  top:80px;
  bottom:150px;
  width:320px;
  opacity:0;
  pointer-events:none;
  transition:opacity .5s;
  overflow-y:auto;
}
#teamPanel.v{opacity:1;}
.tp-title{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:8px;padding:0 2px;}
.trow{background:rgba(4,8,20,.92);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;transition:all .4s;position:relative;overflow:hidden;backdrop-filter:blur(16px);}
.trow.lead{border-color:rgba(255,215,0,.6);background:rgba(255,215,0,.1);box-shadow:0 0 24px rgba(255,215,0,.15),inset 0 0 20px rgba(255,215,0,.04);}
.trow-left{display:flex;align-items:center;gap:10px;}
.tstrip{width:4px;height:38px;border-radius:3px;flex-shrink:0;}
.trow .tn{font-size:15px;font-weight:700;color:rgba(255,255,255,.7);line-height:1.2;}
.trow.lead .tn{color:#fff;text-shadow:0 0 12px rgba(255,255,255,.3);}
.trow .tpc{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px;letter-spacing:.5px;}
.trow.lead .tpc{color:rgba(255,215,0,.6);}
.trow-right{text-align:right;}
.trow .tb{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:rgba(255,255,255,.5);}
.trow.lead .tb{color:#ffd700;text-shadow:0 0 16px rgba(255,215,0,.5);}
.trow .tbl{font-size:9px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.trow.lead .tbl{color:rgba(255,215,0,.4);}
.lbdg{position:absolute;top:0;right:0;background:linear-gradient(135deg,#ffd700,#e6a800);color:#000;font-size:9px;font-weight:900;letter-spacing:1.5px;padding:3px 9px;border-radius:0 12px 0 8px;}

/* ═══ TOP BAR ═══ */
#topBar{
  position:absolute;top:0;left:0;right:0;height:64px;
  background:linear-gradient(180deg,rgba(4,8,18,.92),transparent);
  display:flex;align-items:center;padding:0 50px;justify-content:space-between;
  opacity:0;transition:opacity .5s;pointer-events:none;
}
#topBar.v{opacity:1;}
.tb-name{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:#00e5ff;letter-spacing:3px;}
.tb-stats{display:flex;gap:36px;}
.tb-s .v{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#fff;}
.tb-s .l{font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.4);text-transform:uppercase;}

/* ═══ SOLD ═══ */
#sold{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
#sold.v{opacity:1;}
.scrd{background:linear-gradient(135deg,rgba(7,14,32,.99),rgba(3,7,18,1));border:2px solid #ffd700;border-radius:32px;padding:50px 80px;text-align:center;box-shadow:0 0 120px rgba(255,215,0,.2);animation:ci .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes ci{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.hm{font-size:80px;display:block;margin-bottom:8px;animation:hs .6s ease-out;}
@keyframes hs{0%{transform:rotate(-30deg) scale(1.5)}60%{transform:rotate(8deg)}100%{transform:rotate(0) scale(1)}}
.stxt{font-family:'Bebas Neue',cursive;font-size:130px;color:#ffd700;letter-spacing:12px;line-height:1;text-shadow:0 0 60px rgba(255,215,0,.6);}
.spnm{font-family:'Bebas Neue',cursive;font-size:66px;color:#fff;letter-spacing:4px;}
.sarr{font-size:30px;color:#00e5ff;margin:6px 0;}
.stnm{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:#00e5ff;letter-spacing:4px;text-transform:uppercase;margin-bottom:16px;}
.spr{font-family:'Orbitron',monospace;font-size:72px;font-weight:900;color:#ffd700;text-shadow:0 0 50px rgba(255,215,0,.5);}

/* ═══ UNSOLD ═══ */
#unsold{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
#unsold.v{opacity:1;}
.ucrd{background:linear-gradient(135deg,rgba(7,14,32,.99),rgba(3,7,18,1));border:2px solid #333;border-radius:28px;padding:48px 80px;text-align:center;animation:ci .4s ease-out;}
.utxt{font-family:'Bebas Neue',cursive;font-size:110px;color:#333;letter-spacing:8px;}
.upnm{font-family:'Bebas Neue',cursive;font-size:52px;color:#555;}

/* TICKER */
#ticker{position:absolute;bottom:134px;left:0;right:0;height:40px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .5s;pointer-events:none;}
#ticker.v{opacity:1;}
.ticker-txt{font-size:18px;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:2px;text-shadow:0 0 20px rgba(0,229,255,.3);}
.hi{color:#ffd700;text-shadow:0 0 15px rgba(255,215,0,.5);}
</style>
</head>
<body>

<div class="parts" id="parts"></div>

<!-- IDLE -->
<div id="idle">
  <div>
    <div class="idle-title" id="idleTitle">CRICKET AUCTION</div>
    <div class="idle-sub">LIVE PLAYER AUCTION</div>
  </div>
</div>

<!-- TOP BAR -->
<div id="topBar">
  <div class="tb-name" id="tbName">CRICKET AUCTION</div>
  <div class="tb-stats">
    <div class="tb-s"><div class="v" id="tsSold">0</div><div class="l">Sold</div></div>
    <div class="tb-s"><div class="v" id="tsRem">0</div><div class="l">Left</div></div>
    <div class="tb-s"><div class="v" id="tsTotal">0</div><div class="l">Total</div></div>
  </div>
</div>

<!-- INTRO CARD (full, 10 sec) -->
<div id="introCard">
  <div class="ic-top">
    <div class="ic-num" id="icNum">PLAYER #01</div>
    <div class="ic-badges" id="icBadges"></div>
  </div>
  <div class="ic-body">
    <div id="icImgWrap"></div>
    <div class="ic-text">
      <div class="ic-name" id="icName">NAME</div>
      <div class="ic-stats" id="icStats"></div>
      <div class="ic-prices">
        <div class="pbox"><div class="plbl">Base Price</div><div class="bval" id="icBase">-</div></div>
        <div class="bidbox">
          <div class="plbl" style="text-align:right">Current Bid</div>
          <div class="bidval" id="icBid">-</div>
          <div class="bidr" id="icBidder">Waiting...</div>
        </div>
      </div>
    </div>
  </div>
  <div class="cdown-bar"><div class="cdown-fill" id="cdownFill"></div></div>
</div>

<!-- IPL-STYLE BOTTOM BAR -->
<div id="compactCard">
  <div class="cc-bg"></div>
  <div class="cc-divider"></div>
  <!-- Player photo rising above bar -->
  <div id="ccPhotoWrap"></div>
  <!-- Badges -->
  <div class="cc-badges-row" id="ccBadges"></div>
  <!-- Left: player name + team -->
  <div class="cc-left">
    <div id="ccTeamLogoWrap"></div>
    <div class="cc-team-info">
      <div class="cc-player-name" id="ccName">-</div>
      <div class="cc-team-name" id="ccBidder">-</div>
    </div>
  </div>
  <!-- Right: bid price -->
  <div class="cc-right">
    <div class="cc-price-label">Current Bid</div>
    <div class="cc-bid" id="ccBid">-</div>
    <div class="cc-base" id="ccBase">-</div>
  </div>
  <!-- Timer -->
  <div class="cc-timer-strip"><div class="cc-timer-fill" id="ccTimerFill" style="width:100%"></div></div>
</div>

<!-- TEAMS PANEL -->
<div id="teamPanel">
  <div class="tp-title">Teams</div>
  <div id="tpList"></div>
</div>

<!-- SOLD -->
<div id="sold">
  <div class="scrd">
    <span class="hm">🔨</span>
    <div class="stxt">SOLD!</div>
    <div class="spnm" id="sPnm"></div>
    <div class="sarr">▼</div>
    <div class="stnm" id="sTnm"></div>
    <div class="spr" id="sPr"></div>
  </div>
</div>

<!-- UNSOLD -->
<div id="unsold">
  <div class="ucrd">
    <div class="utxt">UNSOLD</div>
    <div class="upnm" id="uPnm"></div>
  </div>
</div>

<!-- TICKER -->
<div id="ticker"><div class="ticker-txt" id="tickerTxt">🏏 AUCTION LIVE</div></div>

<script>
const DB='https://auctiontable-bb663-default-rtdb.firebaseio.com';
async function fbGet(p){try{const r=await fetch(DB+'/'+p+'.json');return r.ok?await r.json():null;}catch{return null;}}

// Particles
(()=>{
  const c=document.getElementById('parts');
  const cols=['#00e5ff','#ffd700','#00ff88','#ff6b35'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div');p.className='part';
    const sz=Math.random()*7+2;
    p.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100)+'%;background:'+cols[i%4]+';animation-duration:'+(Math.random()*22+14)+'s;animation-delay:'+(Math.random()*22)+'s;';
    c.appendChild(p);
  }
})();

// ══ STATE ══
let OS={players:{},teams:{},auction:{},activeTourId:null,tourName:'CRICKET AUCTION'};
let prevBid=0, soldTO=null, introTO=null, introShowing=false;
const INTRO_SEC=10; // seconds to show full intro card

function show(id){document.getElementById(id).classList.add('v');}
function hide(id){document.getElementById(id).classList.remove('v');}

async function poll(){
  try{
    const [auction,at]=await Promise.all([fbGet('auction'),fbGet('activeTourn')]);

    if(at&&at.id&&at.id!==OS.activeTourId){
      OS.activeTourId=at.id;
      OS.tourName=(at.name||'CRICKET AUCTION').toUpperCase();
      document.getElementById('idleTitle').textContent=OS.tourName;
      document.getElementById('tbName').textContent=OS.tourName;
    }

    if(OS.activeTourId){
      const [players,teams]=await Promise.all([
        fbGet('tours/'+OS.activeTourId+'/players'),
        fbGet('tours/'+OS.activeTourId+'/teams')
      ]);
      if(players){OS.players=players;updStats();}
      if(teams&&JSON.stringify(teams)!==JSON.stringify(OS.teams)){
        OS.teams=teams;
        renderTeams(OS.auction.currentBidder);
      }
    }

    if(auction){
      const prev={...OS.auction};
      OS.auction=auction;
      handle(prev,auction);
    }
  }catch(e){}
  setTimeout(poll,850);
}

function handle(prev,cur){
  const{status,currentPlayerId,currentBid,currentBidder,currentBidderName,
        timer,timerDuration,lastSoldPlayer,lastSoldTeam,lastSoldPrice,isReAuction}=cur;

  // SOLD event
  if(status==='sold'&&prev.status!=='sold'){
    clearTimeout(introTO);
    hide('introCard'); hide('compactCard'); hide('teamPanel'); hide('topBar'); hide('ticker'); hide('idle');
    show('sold');
    document.getElementById('sPnm').textContent=(lastSoldPlayer||'').toUpperCase();
    document.getElementById('sTnm').textContent=(lastSoldTeam||'').toUpperCase();
    document.getElementById('sPr').textContent=fmt(lastSoldPrice);
    clearTimeout(soldTO);
    soldTO=setTimeout(()=>{hide('sold');show('idle');},5000);
    return;
  }

  // UNSOLD event
  if(status==='unsold'&&prev.status!=='unsold'){
    clearTimeout(introTO);
    hide('introCard');hide('compactCard');hide('teamPanel');hide('topBar');hide('ticker');hide('idle');
    show('unsold');
    const p=OS.players[currentPlayerId];
    document.getElementById('uPnm').textContent=(p?.name||'').toUpperCase();
    setTimeout(()=>{hide('unsold');show('idle');},4000);
    return;
  }

  if(status==='sold'||status==='unsold') return;

  clearTimeout(soldTO);
  hide('sold');hide('unsold');

  // No player → idle
  if(!currentPlayerId){
    clearTimeout(introTO);
    introShowing=false;
    hide('introCard');hide('compactCard');hide('teamPanel');hide('topBar');hide('ticker');
    show('idle');
    return;
  }

  hide('idle');
  show('topBar');show('ticker');show('teamPanel');

  const p=OS.players[currentPlayerId];
  if(!p) return;

  // Detect new player
  const isNewPlayer = prev.currentPlayerId !== currentPlayerId;

  if(isNewPlayer){
    // Show intro card for INTRO_SEC seconds
    introShowing=true;
    clearTimeout(introTO);
    show('introCard');
    hide('compactCard');

    // Animate countdown bar
    const fill=document.getElementById('cdownFill');
    fill.style.transition='none';
    fill.style.width='100%';
    void fill.offsetWidth;
    fill.style.transition='width '+INTRO_SEC+'s linear';
    fill.style.width='0%';

    introTO=setTimeout(()=>{
      introShowing=false;
      hide('introCard');
      show('compactCard');
    }, INTRO_SEC*1000);
  }

  // Update intro card
  updateIntroCard(p,cur,isReAuction);

  // Update compact card (always)
  updateCompactCard(p,cur);

  // Update ticker
  let tk='🏏 AUCTION LIVE';
  if(status==='paused') tk='⏸ PAUSED';
  else if(status==='ended') tk=currentBidderName?'🔨 FINAL — '+currentBidderName.toUpperCase():'❌ NO BIDS';
  else if(currentBidderName) tk='💰 <span class="hi">'+currentBidderName.toUpperCase()+'</span> leads @'+fmt(currentBid);
  document.getElementById('tickerTxt').innerHTML=tk;

  renderTeams(currentBidder);
}

function updateIntroCard(p,cur,isReAuction){
  const{currentBid,currentBidder,currentBidderName,timer,timerDuration}=cur;
  const idx=Object.keys(OS.players).indexOf(cur.currentPlayerId)+1;
  document.getElementById('icNum').textContent='PLAYER #'+String(idx).padStart(2,'0');

  // Badges
  const roleMap={bat:['BAT','rb-bat'],bowl:['BOWL','rb-bowl'],all:['ALL','rb-all'],wk:['WK','rb-wk']};
  const [rn,rc]=roleMap[p.role]||['BAT','rb-bat'];
  let badges='<span class="rbadge '+rc+'">'+rn+'</span>';
  if(p.type==='home') badges+='<span class="rbadge rb-home">HOME</span>';
  if(p.type==='away') badges+='<span class="rbadge rb-away">AWAY</span>';
  if(isReAuction) badges+='<span class="rbadge rb-re">RE-AUCTION</span>';
  document.getElementById('icBadges').innerHTML=badges;

  // Photo
  document.getElementById('icImgWrap').innerHTML=p.img
    ?'<img src="'+p.img+'" class="ic-photo" onerror="this.outerHTML=\'<div class=\\"ic-photo-ph\\">👤</div>\'">'
    :'<div class="ic-photo-ph">👤</div>';

  document.getElementById('icName').textContent=(p.name||'').toUpperCase();
  document.getElementById('icStats').textContent=p.stats||'';
  document.getElementById('icBase').textContent=fmt(p.basePrice);

  const bid=currentBid||p.basePrice;
  const be=document.getElementById('icBid');
  if(bid!==prevBid){be.classList.remove('pop');void be.offsetWidth;be.classList.add('pop');}
  be.textContent=fmt(bid);
  document.getElementById('icBidder').textContent=currentBidderName?'🔥 '+currentBidderName:'Waiting for bids...';
  prevBid=bid;
}

function updateCompactCard(p,cur){
  const{currentBid,currentBidder,currentBidderName,timer,timerDuration}=cur;
  const bid=currentBid||p.basePrice;

  // Player photo (rises above bar)
  document.getElementById('ccPhotoWrap').innerHTML=p.img
    ?'<img src="'+p.img+'" onerror="this.style.display=\'none\'">'
    :'<div class="cc-photo-ph">👤</div>';

  // Badges
  const roleMap={bat:['BAT','rb-bat'],bowl:['BOWL','rb-bowl'],all:['ALL','rb-all'],wk:['WK','rb-wk']};
  const [rn,rc]=roleMap[p.role]||['BAT','rb-bat'];
  let b='<span class="cbadge '+rc+'">'+rn+'</span>';
  if(p.type==='home') b+='<span class="cbadge rb-home">HOME</span>';
  if(p.type==='away') b+='<span class="cbadge rb-away">AWAY</span>';
  document.getElementById('ccBadges').innerHTML=b;

  // Player name
  document.getElementById('ccName').textContent=(p.name||'').toUpperCase();

  // Team logo (bidding team)
  const bidTeam = currentBidder ? OS.teams[currentBidder] : null;
  const logoWrap = document.getElementById('ccTeamLogoWrap');
  if(bidTeam && bidTeam.logo){
    logoWrap.innerHTML='<img src="'+bidTeam.logo+'" class="cc-team-logo">';
  } else if(bidTeam){
    logoWrap.innerHTML='<div class="cc-team-logo-ph" style="background:'+bidTeam.color+'22;border-color:'+bidTeam.color+'44">🏆</div>';
  } else {
    logoWrap.innerHTML='<div class="cc-team-logo-ph">🏏</div>';
  }

  // Team name / bidder
  document.getElementById('ccBidder').textContent=currentBidderName?'SOLD TO: '+currentBidderName.toUpperCase():'NO BIDS YET';

  // Bid price with pop animation
  const ce=document.getElementById('ccBid');
  if(bid!==prevBid){ce.classList.remove('pop');void ce.offsetWidth;ce.classList.add('pop');}
  ce.textContent=fmt(bid);
  document.getElementById('ccBase').textContent='Base Price: '+fmt(p.basePrice);
  prevBid=bid;

  // Timer strip
  const t=timer||0,tot=timerDuration||30;
  const tf=document.getElementById('ccTimerFill');
  tf.style.width=Math.max(0,(t/tot)*100)+'%';
  tf.className='cc-timer-fill'+(t<=5?' urg':'');
}

function renderTeams(leadId){
  const entries=Object.entries(OS.teams);
  document.getElementById('tpList').innerHTML=entries.map(([id,t])=>
    '<div class="trow '+(id===leadId?'lead':'')+'" style="border-left:3px solid '+(t.color||'#00e5ff')+'">'+
      (id===leadId?'<div class="lbdg">LEADING</div>':'')+
      '<div class="trow-left">'+
        (t.logo?'<img src="'+t.logo+'" style="width:34px;height:34px;border-radius:7px;object-fit:cover;flex-shrink:0">':
          '<div class="tstrip" style="background:'+(t.color||'#00e5ff')+'"></div>')+
        '<div>'+
          '<div class="tn">'+t.name+'</div>'+
          '<div class="tpc">'+(t.players||[]).length+' players signed</div>'+
        '</div>'+
      '</div>'+
      '<div class="trow-right">'+
        '<div class="tb">'+fmt(t.currentBudget)+'</div>'+
        '<div class="tbl">purse left</div>'+
      '</div>'+
    '</div>'
  ).join('');
}

function updStats(){
  const pl=Object.values(OS.players);
  document.getElementById('tsSold').textContent=pl.filter(p=>p.status==='sold').length;
  document.getElementById('tsRem').textContent=pl.filter(p=>p.status==='available'||p.status==='active').length;
  document.getElementById('tsTotal').textContent=pl.length;
}

function fmt(n){if(!n&&n!==0)return'0';if(n>=100000)return'₹'+(n/100000).toFixed(1)+'L';if(n>=1000)return'₹'+(n/1000).toFixed(n%1000===0?0:1)+'K';return'₹'+n;}

// Start
setTimeout(()=>show('idle'),400);
poll();
</script>
</body>
</html>
